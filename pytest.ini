[pytest]
# Configuración de pytest

# Directorio de tests
testpaths = tests

# Patrones de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers personalizados
markers =
    integration: tests de integración
pythonpath = .

    unit: tests unitarios
    slow: tests lentos
    mock: tests con mocks
