version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    command: "./qdrant --config-path /config/config.yml"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
      - ./qdrant_config/config.yml:/config/config.yml
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing_rag_api
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped