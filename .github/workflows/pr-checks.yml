name: PR Security Guard

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Linter and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python environment with uv
        run: uv python install 3.11

      - name: Sync Dependencies (incluyendo dev)
        run: uv sync

      - name: Run Ruff Linter
        run: uv run ruff check .
          
      - name: Init Qdrant Collections
        run: |
          curl -X PUT 'http://localhost:6333/collections/langchain_index' -H 'Content-Type: application/json' -d '{"vectors": {"size": 3072, "distance": "Cosine"}}'
          curl -X PUT 'http://localhost:6333/collections/llamaindex_index' -H 'Content-Type: application/json' -d '{"vectors": {"size": 3072, "distance": "Cosine"}}'

      - name: Run Pytest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY != '' && secrets.GEMINI_API_KEY || 'dummy-gemini-key' }}
        run: uv run pytest tests/ -v
